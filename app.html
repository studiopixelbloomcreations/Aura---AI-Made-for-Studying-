<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aevra AI - Study Workspace</title>
  <meta name="description" content="Chat, voice identity, exam practice, and progress tracking with Aevra AI.">
  <meta property="og:title" content="Aevra AI - Study Workspace">
  <link rel="icon" href="assets/logo_aevra.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/sidebar.css">
  <link rel="stylesheet" href="styles/chat.css">
  <link rel="stylesheet" href="styles/animations.css">
  <link rel="stylesheet" href="styles/mobile.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-logo"><img src="assets/logo_aevra.svg" alt="Aevra AI"><span>Aevra AI</span></div>
      <button class="new-chat-btn" type="button"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>New chat</button>
      <nav class="conversation-list" aria-label="Conversation history">
        <div class="conv-group-label">Today</div>
        <div class="conv-item">Quadratic equations</div>
        <div class="conv-item">Newton's laws</div>
        <div class="conv-group-label">Yesterday</div>
        <div class="conv-item">Photosynthesis</div>
      </nav>
      <div class="sidebar-bottom">
        <button class="sidebar-item exam-mode-btn" type="button"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19.5V4a2 2 0 0 1 2-2h11l3 3v14.5"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>Exam Mode<span class="toggle-pill"></span></button>
        <button class="sidebar-item" onclick="showProgress()" type="button"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 3v18h18"/><path d="m7 15 4-4 3 3 5-7"/></svg>My Progress</button>
        <button class="sidebar-item" onclick="showSettings()" type="button"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2 3.4-.2-.1a1.7 1.7 0 0 0-2 .2 1.7 1.7 0 0 0-.8 1.7v.2H10v-.2a1.7 1.7 0 0 0-.8-1.7 1.7 1.7 0 0 0-2-.2l-.2.1-2-3.4.1-.1A1.7 1.7 0 0 0 5.4 15 1.7 1.7 0 0 0 4 13.8h-.2v-3.6H4a1.7 1.7 0 0 0 1.4-1.2 1.7 1.7 0 0 0-.3-1.9L5 7l2-3.4.2.1a1.7 1.7 0 0 0 2-.2A1.7 1.7 0 0 0 10 1.8V1.6h4v.2a1.7 1.7 0 0 0 .8 1.7 1.7 1.7 0 0 0 2 .2l.2-.1L19 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.4 1.2h.2v3.6H20a1.7 1.7 0 0 0-.6 1.2Z"/></svg>Settings</button>
        <div class="user-avatar-section"><div class="avatar-circle">A</div><span class="username">Student</span></div>
      </div>
    </aside>
    <main class="chat-area">
      <div class="chat-topbar">
        <button class="hamburger-btn" type="button" aria-label="Open sidebar"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <button class="model-selector" type="button"><span class="model-name">Aevra AI</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m6 9 6 6 6-6"/></svg></button>
        <div class="topbar-actions"><button class="icon-btn" title="Share" type="button"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="m16 6-4-4-4 4M12 2v14"/></svg></button></div>
      </div>
      <div class="messages-container" id="messages">
        <div class="welcome-screen">
          <div class="welcome-logo"><img src="assets/logo_aevra.svg" alt=""></div>
          <h1 class="welcome-title"><span class="gradient-text">Hello! I'm Aevra</span></h1>
          <p class="welcome-sub">Your personal AI study companion</p>
          <div class="suggestion-chips">
            <button class="chip" onclick="sendSuggestion(this)" type="button">Help me study for my exam</button>
            <button class="chip" onclick="sendSuggestion(this)" type="button">Explain quadratic equations</button>
            <button class="chip" onclick="sendSuggestion(this)" type="button">Quiz me on Science</button>
            <button class="chip" onclick="sendSuggestion(this)" type="button">What's my study streak?</button>
          </div>
        </div>
      </div>
      <div class="input-area">
        <div class="input-container">
          <button class="voice-btn" id="voiceBtn" title="Voice input" type="button"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3"/></svg></button>
          <textarea class="chat-input" id="chatInput" placeholder="Ask Aevra anything..." rows="1" autocomplete="off"></textarea>
          <button class="attach-btn" title="Attach file" type="button"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m21.4 11.6-8.5 8.5a6 6 0 0 1-8.5-8.5l9.2-9.2a4 4 0 1 1 5.7 5.7l-9.2 9.2a2 2 0 0 1-2.8-2.8l8.5-8.5"/></svg></button>
          <button class="send-btn" id="sendBtn" disabled type="button" aria-label="Send"></button>
        </div>
        <p class="input-disclaimer">Aevra AI can make mistakes. Verify important information.</p>
      </div>
    </main>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js" defer></script>
  <script src="core/logger.js"></script><script src="core/state_manager.js"></script><script src="js/theme.js"></script><script src="js/ui_chat.js"></script><script src="js/ui_sidebar.js"></script><script src="js/ui_voice.js"></script><script src="js/ui_exam.js"></script><script src="js/ui_gamification.js"></script><script src="js/ui_settings.js"></script><script src="js/app_controller.js"></script>
</body>
</html>
