<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIS Preview</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #08111f; color: #e8f1ff; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 24px; }
    .hud { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 14px 16px; min-width: 180px; }
    .viewer { position: relative; width: min(100%, 900px); aspect-ratio: 16 / 9; background: #000; border-radius: 18px; overflow: hidden; }
    video, canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .help { margin-top: 14px; color: #b8c9e6; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Visual Intelligence Preview</h1>
    <div class="hud">
      <div class="card">API: <strong id="apiBase"></strong></div>
      <div class="card">Face: <strong id="faceState">starting...</strong></div>
      <div class="card">Emotion: <strong id="emotionState">-</strong></div>
      <div class="card">Confidence: <strong id="confidenceState">-</strong></div>
    </div>
    <div class="viewer">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>
    </div>
    <div class="help">
      Run <code>python -m http.server 5500</code> and open
      <code>http://127.0.0.1:5500/vis_preview.html</code>.
      This preview now uses <code>face-api.js</code> directly for live face box, landmarks, and expressions.
    </div>
  </div>
  <script>
    (async function () {
      const faceApiScriptUrl = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js';
      const faceApiModelUrl = 'https://justadudewhohacks.github.io/face-api.js/models';
      const apiBase = 'face-api.js';
      document.getElementById('apiBase').textContent = apiBase;
      const video = document.getElementById('video');
      const canvas = document.getElementById('overlay');
      const ctx = canvas.getContext('2d');
      const faceState = document.getElementById('faceState');
      const emotionState = document.getElementById('emotionState');
      const confidenceState = document.getElementById('confidenceState');

      function loadScriptOnce(src, id) {
        const existing = document.getElementById(id);
        if (existing) return Promise.resolve(true);
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.id = id;
          script.src = src;
          script.async = true;
          script.defer = true;
          script.onload = () => resolve(true);
          script.onerror = () => reject(new Error('SCRIPT_LOAD_FAILED'));
          document.head.appendChild(script);
        });
      }

      function averagePoint(points, name) {
        const list = Array.isArray(points) ? points : [];
        if (!list.length) return null;
        let sx = 0;
        let sy = 0;
        for (const point of list) {
          sx += Number(point.x || 0);
          sy += Number(point.y || 0);
        }
        return { name, x: sx / list.length, y: sy / list.length };
      }

      function toNormalizedLandmarks(landmarks, vw, vh) {
        const out = [];
        const positions = Array.isArray(landmarks && landmarks.positions) ? landmarks.positions : [];
        for (let i = 0; i < positions.length; i += 1) {
          const pt = positions[i];
          out.push({ name: 'p' + i, x: Number(pt.x || 0) / vw, y: Number(pt.y || 0) / vh });
        }
        const leftEye = averagePoint(landmarks.getLeftEye(), 'left_eye');
        const rightEye = averagePoint(landmarks.getRightEye(), 'right_eye');
        const nose = averagePoint((landmarks.getNose() || []).slice(-3), 'nose');
        [leftEye, rightEye, nose].forEach((pt) => {
          if (!pt) return;
          pt.x = pt.x / vw;
          pt.y = pt.y / vh;
          out.push(pt);
        });
        return out;
      }

      function estimatePoseHint(box, landmarks) {
        const lookup = {};
        for (const point of landmarks) {
          const name = String(point && point.name || '');
          if (name && !(name in lookup)) lookup[name] = point;
        }
        const leftEye = lookup.left_eye;
        const rightEye = lookup.right_eye;
        const nose = lookup.nose;
        if (leftEye && rightEye && nose) {
          const eyeMidX = (Number(leftEye.x || 0) + Number(rightEye.x || 0)) / 2;
          const noseDx = Number(nose.x || 0) - eyeMidX;
          if (noseDx <= -0.03) return 'left';
          if (noseDx >= 0.03) return 'right';
        }
        const cx = box.x + box.width / 2;
        const cy = box.y + box.height / 2;
        const area = box.width * box.height;
        if (area >= 0.2) return 'close';
        if (cx < 0.38) return 'left';
        if (cx > 0.62) return 'right';
        if (cy < 0.38) return 'up';
        if (cy > 0.62) return 'down';
        return 'center';
      }

      function topExpression(expressions) {
        if (!expressions || typeof expressions !== 'object') return 'neutral';
        let bestLabel = 'neutral';
        let bestScore = -1;
        for (const key of Object.keys(expressions)) {
          const score = Number(expressions[key]);
          if (Number.isFinite(score) && score > bestScore) {
            bestScore = score;
            bestLabel = key;
          }
        }
        return bestLabel;
      }

      await loadScriptOnce(faceApiScriptUrl, 'visPreviewFaceApiScript');
      await Promise.all([
        window.faceapi.nets.ssdMobilenetv1.loadFromUri(faceApiModelUrl),
        window.faceapi.nets.faceLandmark68Net.loadFromUri(faceApiModelUrl),
        window.faceapi.nets.faceExpressionNet.loadFromUri(faceApiModelUrl),
        window.faceapi.nets.faceRecognitionNet.loadFromUri(faceApiModelUrl),
        window.faceapi.nets.ageGenderNet.loadFromUri(faceApiModelUrl),
      ]);

      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      video.srcObject = stream;
      await video.play();

      async function tick() {
        if (!video.videoWidth || !video.videoHeight) {
          requestAnimationFrame(tick);
          return;
        }
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        try {
          const detections = await window.faceapi
            .detectAllFaces(
              video,
              new window.faceapi.SsdMobilenetv1Options({
                minConfidence: 0.5,
              })
            )
            .withFaceLandmarks()
            .withFaceExpressions()
            .withAgeAndGender()
            .withFaceDescriptors();
          const displaySize = { width: video.videoWidth, height: video.videoHeight };
          window.faceapi.matchDimensions(canvas, displaySize);
          const resizedResults = window.faceapi.resizeResults(detections, displaySize);
          window.faceapi.draw.drawDetections(canvas, resizedResults);
          window.faceapi.draw.drawFaceLandmarks(canvas, resizedResults);
          window.faceapi.draw.drawFaceExpressions(canvas, resizedResults, 0.05);
          faceState.textContent = detections.length ? ('yes (' + String(detections.length) + ')') : 'no';
          if (detections.length) {
            const first = detections[0];
            emotionState.textContent = String(topExpression(first.expressions || {}) || '-');
            confidenceState.textContent = Number(first.detection.score || 0).toFixed(2);
            const box = resizedResults[0] && resizedResults[0].detection ? resizedResults[0].detection.box : null;
            if (box) {
              const lines = [
                String(Math.round(Number(first.age || 0))) + ' years',
                String(first.gender || '-') + ' (' + Number(first.genderProbability || 0).toFixed(2) + ')',
                String(topExpression(first.expressions || {}) || '-')
              ];
              new window.faceapi.draw.DrawTextField(lines, { x: box.x, y: box.y + box.height + 10 }, {
                anchorPosition: 'BOTTOM_LEFT',
                backgroundColor: 'rgba(0, 0, 0, 0.55)'
              }).draw(canvas);
            }
          } else {
            emotionState.textContent = '-';
            confidenceState.textContent = '-';
          }
        } catch (error) {
          faceState.textContent = 'error';
          emotionState.textContent = String(error && error.message || error);
        }
        setTimeout(tick, 250);
      }

      tick();
    })();
  </script>
</body>
</html>
