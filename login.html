<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — AURA AI</title>
  <meta name="description" content="Sign in to AURA AI — your personal AI learning companion." />
  <link rel="icon" href="public/aura-icon.png" type="image/png" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <main class="auth-root" role="main">
    <div class="auth-bg" aria-hidden="true"></div>

    <section class="auth-card" aria-labelledby="authTitle">
      <header class="auth-brand">
        <img src="public/aura-logo.png" alt="AURA AI" class="auth-logo" />
        <h1 class="auth-title" id="authTitle">Welcome back</h1>
        <p class="auth-subtitle">Sign in to continue to your personal AI learning companion</p>
      </header>

      <form id="loginForm" class="auth-form" novalidate autocomplete="on">
        <div class="auth-input-wrap">
          <input
            id="email"
            name="email"
            type="email"
            class="auth-input"
            placeholder=" "
            autocomplete="email"
            required
          />
          <label for="email" class="auth-input-label">Email address</label>
        </div>

        <div class="auth-input-wrap">
          <input
            id="password"
            name="password"
            type="password"
            class="auth-input"
            placeholder=" "
            autocomplete="current-password"
            required
          />
          <label for="password" class="auth-input-label">Password</label>
          <button type="button" class="auth-input-toggle" id="togglePassword" aria-label="Show password" tabindex="-1">
            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <button type="submit" class="auth-btn auth-btn-primary" id="submitBtn">
          <span id="submitText">Continue</span>
          <span class="auth-btn-spinner" id="submitSpinner" style="display:none" aria-hidden="true"></span>
        </button>

        <div class="auth-divider">
          <span class="auth-divider-text">or</span>
        </div>

        <button type="button" class="auth-btn auth-btn-google" id="googleBtn">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Continue with Google</span>
        </button>
      </form>

      <div class="auth-links">
        <a href="signup.html?return=app.html" class="auth-link">Create account</a>
        <a href="index.html" class="auth-link" style="color: var(--aura-text-muted);">Back to home</a>
      </div>
    </section>

    <footer class="auth-footer">
      <p class="auth-footer-text">AURA AI — AI Made for Studying</p>
    </footer>
  </main>

  <div id="toast" class="auth-toast" role="status" aria-live="polite"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="firebase_config.js"></script>
  <script src="login.js"></script>
</body>
</html>
